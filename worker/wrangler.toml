name = "cardtrader-deal-scanner"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# ---------------------------------------------------------------------------
# Cron trigger — hourly, top of the hour, UTC.
# The scheduled() handler and POST /api/scan/run-now share the same runScan()
# code path — never fork the logic.
# ---------------------------------------------------------------------------
[triggers]
crons = ["0 * * * *"]

# ---------------------------------------------------------------------------
# D1 database binding.
# After running `npx wrangler d1 create cardtrader_scanner`, copy the returned
# database_id value here to replace REPLACE_AFTER_D1_CREATE.
# The binding name "DB" is the contract across the whole codebase (env.DB).
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cardtrader_scanner"
database_id = "32265ad6-4e1d-4ef8-8086-899962fcdb1f"

# ---------------------------------------------------------------------------
# NO [assets] block — this Worker is API-only.
# The dashboard ships as a separate Tauri desktop app (not served from here).
# Adding [assets] would reintroduce static-asset hosting the architecture
# deliberately dropped (see docs/.bootstrap-discovery.md).
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Secrets — set via `wrangler secret put`, NEVER in this file or source.
# Run from the /worker directory:
#
#   npx wrangler secret put CARDTRADER_API_TOKEN
#       CardTrader API v2 bearer token — read + write/purchase scope.
#       HIGH SENSITIVITY: rotate immediately if ever exposed in a log, commit,
#       response, or bundle. The app never calls purchase endpoints (PRD §2).
#
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#       Telegram Bot API token from @BotFather. Used for sendMessage pushes.
#
#   npx wrangler secret put TELEGRAM_CHAT_ID
#       Telegram chat/channel id that receives deal notifications.
#
#   npx wrangler secret put DESKTOP_AUTH_TOKEN
#       Shared bearer the Tauri desktop app sends on every /api/* request.
#       Stored on-device in OS-backed secure storage (never in committed config
#       or the JS bundle). Generated by the owner — see phase-0-runbook.md.
# ---------------------------------------------------------------------------
